openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: CampusMart API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: products
    description: Product listings
  - name: categories
    description: Product categories
  - name: cart
    description: Shopping cart operations
  - name: orders
    description: Order management
  - name: rooms
    description: Student housing listings
  - name: food
    description: Campus food vendors and items
  - name: users
    description: User profile operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: registerUser
      tags: [auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logoutUser
      tags: [auth]
      summary: Logout user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: campus
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [newest, price_asc, price_desc, popular]
        - name: page
          in: query
          schema:
            type: number
        - name: limit
          in: query
          schema:
            type: number
        - name: featured
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Products list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductsResponse"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create product listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List product categories
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /cart:
    get:
      operationId: getCart
      tags: [cart]
      summary: Get current user's cart
      responses:
        "200":
          description: Cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
    post:
      operationId: addToCart
      tags: [cart]
      summary: Add item to cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddToCartRequest"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
    delete:
      operationId: clearCart
      tags: [cart]
      summary: Clear cart
      responses:
        "200":
          description: Cart cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /cart/{itemId}:
    put:
      operationId: updateCartItem
      tags: [cart]
      summary: Update cart item quantity
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCartItemRequest"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
    delete:
      operationId: removeCartItem
      tags: [cart]
      summary: Remove item from cart
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List user orders
      responses:
        "200":
          description: Orders list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create order from cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /rooms:
    get:
      operationId: listRooms
      tags: [rooms]
      summary: List student housing listings
      parameters:
        - name: type
          in: query
          schema:
            type: string
        - name: campus
          in: query
          schema:
            type: string
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
      responses:
        "200":
          description: Rooms list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Room"
    post:
      operationId: createRoom
      tags: [rooms]
      summary: Create room listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoomRequest"
      responses:
        "201":
          description: Room created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"

  /rooms/{id}:
    get:
      operationId: getRoom
      tags: [rooms]
      summary: Get room by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"

  /food/vendors:
    get:
      operationId: listFoodVendors
      tags: [food]
      summary: List food vendors
      parameters:
        - name: campus
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Vendors list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FoodVendor"

  /food/items:
    get:
      operationId: listFoodItems
      tags: [food]
      summary: List food items
      parameters:
        - name: vendorId
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: campus
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Food items list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FoodItem"

  /users/profile:
    get:
      operationId: getUserProfile
      tags: [users]
      summary: Get user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    put:
      operationId: updateUserProfile
      tags: [users]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/wishlist:
    get:
      operationId: getWishlist
      tags: [users]
      summary: Get user wishlist
      responses:
        "200":
          description: Wishlist
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: toggleWishlist
      tags: [users]
      summary: Toggle product in wishlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WishlistToggleRequest"
      responses:
        "200":
          description: Wishlist updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WishlistToggleResponse"

  /users/listings:
    get:
      operationId: getUserListings
      tags: [users]
      summary: Get user's own product listings
      responses:
        "200":
          description: User listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    RegisterRequest:
      type: object
      properties:
        email:
          type: string
        phone:
          type: string
        username:
          type: string
        password:
          type: string
        campus:
          type: string
      required:
        - email
        - phone
        - username
        - password

    LoginRequest:
      type: object
      properties:
        emailOrPhone:
          type: string
        password:
          type: string
      required:
        - emailOrPhone
        - password

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
      required:
        - user
        - token

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        phone:
          type: string
        username:
          type: string
        campus:
          type: string
        avatarUrl:
          type: string
        role:
          type: string
          enum: [student, admin]
        createdAt:
          type: string
      required:
        - id
        - email
        - username

    UserProfile:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        phone:
          type: string
        username:
          type: string
        campus:
          type: string
        avatarUrl:
          type: string
        rating:
          type: number
        totalSales:
          type: number
        totalListings:
          type: number
        createdAt:
          type: string
      required:
        - id
        - email
        - username

    UpdateProfileRequest:
      type: object
      properties:
        username:
          type: string
        phone:
          type: string
        campus:
          type: string
        avatarUrl:
          type: string

    Product:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        price:
          type: number
        originalPrice:
          type: number
        category:
          type: string
        condition:
          type: string
          enum: [new, like_new, good, fair]
        campus:
          type: string
        images:
          type: array
          items:
            type: string
        stock:
          type: number
        status:
          type: string
          enum: [active, sold, paused]
        badge:
          type: string
          enum: [HOT, NEW, SALE]
        sellerId:
          type: string
        sellerUsername:
          type: string
        sellerAvatar:
          type: string
        sellerRating:
          type: number
        isWishlisted:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - title
        - price
        - category
        - campus

    CreateProductRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        price:
          type: number
        originalPrice:
          type: number
        category:
          type: string
        condition:
          type: string
        campus:
          type: string
        images:
          type: array
          items:
            type: string
        stock:
          type: number
      required:
        - title
        - price
        - category
        - condition
        - campus

    ProductsResponse:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: number
        page:
          type: number
        totalPages:
          type: number
      required:
        - products
        - total

    Category:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        icon:
          type: string
        count:
          type: number
      required:
        - id
        - name

    Cart:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        total:
          type: number
        itemCount:
          type: number
      required:
        - items
        - total
        - itemCount

    CartItem:
      type: object
      properties:
        id:
          type: string
        productId:
          type: string
        title:
          type: string
        price:
          type: number
        image:
          type: string
        quantity:
          type: number
        sellerId:
          type: string
        sellerUsername:
          type: string
      required:
        - id
        - productId
        - title
        - price
        - quantity

    AddToCartRequest:
      type: object
      properties:
        productId:
          type: string
        quantity:
          type: number
      required:
        - productId
        - quantity

    UpdateCartItemRequest:
      type: object
      properties:
        quantity:
          type: number
      required:
        - quantity

    Order:
      type: object
      properties:
        id:
          type: string
        orderId:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        totalAmount:
          type: number
        status:
          type: string
          enum: [pending, awaiting_payment, confirmed, shipped, delivered, cancelled]
        deliveryAddress:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - orderId
        - items
        - totalAmount
        - status

    OrderItem:
      type: object
      properties:
        productId:
          type: string
        title:
          type: string
        price:
          type: number
        quantity:
          type: number
        image:
          type: string
        sellerUsername:
          type: string
      required:
        - productId
        - title
        - price
        - quantity

    CreateOrderRequest:
      type: object
      properties:
        deliveryAddress:
          type: string
        paymentMethod:
          type: string
      required:
        - deliveryAddress

    Room:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [bedsitter, single, one_bedroom, two_bedroom, hostel]
        monthlyRent:
          type: number
        campus:
          type: string
        distanceToCampus:
          type: string
        images:
          type: array
          items:
            type: string
        amenities:
          type: array
          items:
            type: string
        available:
          type: boolean
        landlordName:
          type: string
        landlordPhone:
          type: string
        createdAt:
          type: string
      required:
        - id
        - title
        - type
        - monthlyRent
        - campus
        - available

    CreateRoomRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        type:
          type: string
        monthlyRent:
          type: number
        campus:
          type: string
        distanceToCampus:
          type: string
        images:
          type: array
          items:
            type: string
        amenities:
          type: array
          items:
            type: string
        landlordPhone:
          type: string
      required:
        - title
        - type
        - monthlyRent
        - campus

    FoodVendor:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        campus:
          type: string
        bannerImage:
          type: string
        rating:
          type: number
        deliveryTime:
          type: string
        minOrder:
          type: number
        categories:
          type: array
          items:
            type: string
        isOpen:
          type: boolean
      required:
        - id
        - name
        - campus

    FoodItem:
      type: object
      properties:
        id:
          type: string
        vendorId:
          type: string
        vendorName:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number
        image:
          type: string
        category:
          type: string
        available:
          type: boolean
        campus:
          type: string
      required:
        - id
        - vendorId
        - name
        - price
        - category

    WishlistToggleRequest:
      type: object
      properties:
        productId:
          type: string
      required:
        - productId

    WishlistToggleResponse:
      type: object
      properties:
        wishlisted:
          type: boolean
        productId:
          type: string
      required:
        - wishlisted
        - productId
