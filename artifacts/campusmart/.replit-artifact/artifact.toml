kind = "web"
previewPath = "/"
title = "CampusMart"
version = "1.0.0"
id = "artifacts/campusmart"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19301

[services.development]
run = "pnpm --filter @workspace/campusmart run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/campusmart", "run", "build" ]
publicDir = "artifacts/campusmart/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
CAMPUSMART_PORT = "19301"
BASE_PATH = "/"
